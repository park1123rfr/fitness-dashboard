<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e97b;
      --text: #e8eaf6;
      --muted: #7b7f9e;
      --border: #2a2d3e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #last-updated { font-size: 0.78rem; color: var(--muted); }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }
    .kpi-card.c1::before { background: var(--accent); }
    .kpi-card.c2::before { background: var(--accent2); }
    .kpi-card.c3::before { background: var(--accent3); }
    .kpi-card.c4::before { background: #f9a825; }
    .kpi-card.c5::before { background: #29b6f6; }
    .kpi-card.c6::before { background: #ef5350; }
    .kpi-card.c7::before { background: #ff9800; }
    .kpi-card.c8::before { background: #ab47bc; }
    .kpi-card.c9::before { background: #26c6da; }

    /* ── 1RM Grid ── */
    .rm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .kpi-unit { font-size: 0.85rem; color: var(--muted); margin-left: 4px; }
    .kpi-sub { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }

    /* ── Section title ── */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* ── Chart cards ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 720px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .chart-card canvas { max-height: 220px; }

    /* ── Heatmap ── */
    .heatmap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      overflow-x: auto;
    }
    #heatmap { display: flex; gap: 3px; }
    .heatmap-week { display: flex; flex-direction: column; gap: 3px; }
    .heatmap-day {
      width: 13px; height: 13px;
      border-radius: 3px;
      background: var(--surface2);
      cursor: default;
      transition: transform .1s;
    }
    .heatmap-day:hover { transform: scale(1.3); }
    .heatmap-day.lvl1 { background: #3d3580; }
    .heatmap-day.lvl2 { background: #5a50c5; }
    .heatmap-day.lvl3 { background: #8b85e0; }
    .heatmap-day.lvl4 { background: var(--accent); }
    .heatmap-legend { display: flex; align-items: center; gap: 4px; margin-top: 10px; font-size: .72rem; color: var(--muted); }
    .heatmap-legend .heatmap-day { width: 11px; height: 11px; cursor: default; }
    .heatmap-legend .heatmap-day:hover { transform: none; }

    /* ── InBody ── */
    .inbody-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 720px) { .inbody-grid { grid-template-columns: 1fr; } }

    /* ── Recent workouts ── */
    .workout-list { display: flex; flex-direction: column; gap: 10px; }
    .workout-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .workout-item:hover { border-color: var(--accent); }
    .workout-info .wi-title { font-weight: 600; font-size: 0.95rem; }
    .workout-info .wi-meta { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .workout-badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .badge {
      font-size: 0.72rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* ── Empty state ── */
    .empty { text-align: center; color: var(--muted); padding: 48px 0; font-size: .9rem; }

    /* ── Tooltip ── */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: .72rem;
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
    }
  </style>
</head>
<body>

<header>
  <h1>💪 Fitness Dashboard</h1>
  <span id="last-updated">데이터 로딩 중…</span>
</header>

<main>
  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card c1">
      <div class="kpi-label">총 운동 횟수</div>
      <div class="kpi-value" id="kpi-total">–</div>
      <div class="kpi-sub" id="kpi-this-month"></div>
    </div>
    <div class="kpi-card c2">
      <div class="kpi-label">이번 달 운동</div>
      <div class="kpi-value" id="kpi-month">–</div>
      <div class="kpi-sub" id="kpi-week-avg"></div>
    </div>
    <div class="kpi-card c3">
      <div class="kpi-label">체중</div>
      <div class="kpi-value" id="kpi-weight">–<span class="kpi-unit">kg</span></div>
      <div class="kpi-sub" id="kpi-weight-change"></div>
    </div>
    <div class="kpi-card c4">
      <div class="kpi-label">체지방률</div>
      <div class="kpi-value" id="kpi-fat">–<span class="kpi-unit">%</span></div>
      <div class="kpi-sub" id="kpi-fat-change"></div>
    </div>
    <div class="kpi-card c5">
      <div class="kpi-label">골격근량</div>
      <div class="kpi-value" id="kpi-muscle">–<span class="kpi-unit">kg</span></div>
      <div class="kpi-sub" id="kpi-muscle-change"></div>
    </div>
  </div>

  <!-- Workout Heatmap -->
  <div class="heatmap-card">
    <div class="section-title"><span class="dot"></span>운동 히트맵 (최근 1년)</div>
    <div id="heatmap"></div>
    <div class="heatmap-legend">
      <span>적음</span>
      <div class="heatmap-day"></div>
      <div class="heatmap-day lvl1"></div>
      <div class="heatmap-day lvl2"></div>
      <div class="heatmap-day lvl3"></div>
      <div class="heatmap-day lvl4"></div>
      <span>많음</span>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="section-title"><span class="dot" style="background:var(--accent2)"></span>월별 운동 횟수</div>
      <canvas id="chartMonthly"></canvas>
    </div>
    <div class="chart-card">
      <div class="section-title"><span class="dot" style="background:var(--accent3)"></span>요일별 운동 분포</div>
      <canvas id="chartWeekday"></canvas>
    </div>
  </div>

  <!-- InBody Charts -->
  <div class="inbody-grid">
    <div class="chart-card">
      <div class="section-title"><span class="dot" style="background:#f9a825"></span>체중 변화</div>
      <canvas id="chartWeight"></canvas>
    </div>
    <div class="chart-card">
      <div class="section-title"><span class="dot" style="background:#29b6f6"></span>체성분 변화</div>
      <canvas id="chartComposition"></canvas>
    </div>
  </div>

  <!-- Estimated 1RM -->
  <div class="section-title">
    <span class="dot" style="background:#ef5350"></span>추정 1RM
    <span style="font-size:.7rem;color:var(--muted);font-weight:400;">(NSCA 멀티플라이어)</span>
  </div>
  <div class="rm-grid">
    <div class="kpi-card c6">
      <div class="kpi-label">스쿼트</div>
      <div class="kpi-value" id="rm-squat">–<span class="kpi-unit">kg</span></div>
      <div class="kpi-sub" id="rm-squat-sub">데이터 없음</div>
    </div>
    <div class="kpi-card c7">
      <div class="kpi-label">벤치프레스</div>
      <div class="kpi-value" id="rm-bench">–<span class="kpi-unit">kg</span></div>
      <div class="kpi-sub" id="rm-bench-sub">데이터 없음</div>
    </div>
    <div class="kpi-card c8">
      <div class="kpi-label">데드리프트</div>
      <div class="kpi-value" id="rm-deadlift">–<span class="kpi-unit">kg</span></div>
      <div class="kpi-sub" id="rm-deadlift-sub">데이터 없음</div>
    </div>
    <div class="kpi-card c9">
      <div class="kpi-label">오버헤드프레스</div>
      <div class="kpi-value" id="rm-ohp">–<span class="kpi-unit">kg</span></div>
      <div class="kpi-sub" id="rm-ohp-sub">데이터 없음</div>
    </div>
  </div>

  <!-- Recent Workouts -->
  <div class="section-title"><span class="dot"></span>최근 운동 기록</div>
  <div class="workout-list" id="workout-list">
    <div class="empty">운동 데이터를 불러오는 중…</div>
  </div>
</main>

<script>
// ── Helpers ──────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const fmt = (d) => new Date(d).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
const fmtFull = (d) => new Date(d).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
const dur = (s, e) => {
  const m = Math.round((new Date(e) - new Date(s)) / 60000);
  return m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m}m`;
};
const DAYS = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

Chart.defaults.color = '#7b7f9e';
Chart.defaults.borderColor = '#2a2d3e';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

function makeChart(id, type, data, options = {}) {
  return new Chart($(id), {
    type,
    data,
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: { ...options.tooltip } },
      scales: type === 'bar' || type === 'line' ? {
        x: { grid: { color: '#2a2d3e' } },
        y: { grid: { color: '#2a2d3e' }, ...options.yAxis },
      } : {},
      ...options.extra,
    },
  });
}

// ── Workout Data ──────────────────────────────────────────────
async function loadWorkouts() {
  const res = await fetch(`data/workouts.json?t=${Date.now()}`);
  return res.json();
}

async function loadInbody() {
  const res = await fetch(`data/inbody.json?t=${Date.now()}`);
  return res.json();
}

function buildHeatmap(workouts) {
  const container = $('heatmap');
  container.innerHTML = '';

  const counts = {};
  workouts.forEach((w) => {
    const d = w.start_time?.slice(0, 10);
    if (d) counts[d] = (counts[d] || 0) + 1;
  });

  const today = new Date();
  const start = new Date(today);
  start.setFullYear(start.getFullYear() - 1);
  // align to Sunday
  start.setDate(start.getDate() - start.getDay());

  let week = document.createElement('div');
  week.className = 'heatmap-week';
  container.appendChild(week);

  const cur = new Date(start);
  while (cur <= today) {
    if (cur.getDay() === 0 && cur > start) {
      week = document.createElement('div');
      week.className = 'heatmap-week';
      container.appendChild(week);
    }
    const key = cur.toISOString().slice(0, 10);
    const c = counts[key] || 0;
    const cell = document.createElement('div');
    cell.className = 'heatmap-day' + (c >= 3 ? ' lvl4' : c === 2 ? ' lvl3' : c === 1 ? ' lvl2' : c > 0 ? ' lvl1' : '');
    cell.setAttribute('data-tip', `${key}: ${c}회`);
    week.appendChild(cell);
    cur.setDate(cur.getDate() + 1);
  }
}

function renderWorkoutList(workouts) {
  const container = $('workout-list');
  if (!workouts.length) {
    container.innerHTML = '<div class="empty">운동 기록이 없습니다.</div>';
    return;
  }
  const recent = [...workouts]
    .sort((a, b) => new Date(b.start_time) - new Date(a.start_time))
    .slice(0, 10);

  container.innerHTML = recent.map((w) => {
    const exercises = (w.exercises || []).slice(0, 4);
    const badges = exercises.map((e) => `<span class="badge">${e.title}</span>`).join('');
    const more = (w.exercises || []).length > 4
      ? `<span class="badge">+${(w.exercises || []).length - 4}</span>` : '';
    const duration = w.end_time ? dur(w.start_time, w.end_time) : '';
    return `
      <div class="workout-item">
        <div class="workout-info">
          <div class="wi-title">${w.title || '운동'}</div>
          <div class="wi-meta">${fmtFull(w.start_time)}${duration ? ' · ' + duration : ''} · ${(w.exercises||[]).length}종목</div>
        </div>
        <div class="workout-badges">${badges}${more}</div>
      </div>`;
  }).join('');
}

function renderKPI(workouts, inbody) {
  const now = new Date();
  const thisMonth = workouts.filter((w) => {
    const d = new Date(w.start_time);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }).length;

  $('kpi-total').childNodes[0].textContent = workouts.length;
  $('kpi-this-month').textContent = `이번 달: ${thisMonth}회`;
  $('kpi-month').childNodes[0].textContent = thisMonth;

  // week avg (last 4 weeks)
  const fourWeeksAgo = new Date(now - 28 * 86400000);
  const last4w = workouts.filter((w) => new Date(w.start_time) >= fourWeeksAgo).length;
  $('kpi-week-avg').textContent = `주 평균 ${(last4w / 4).toFixed(1)}회`;

  // InBody latest
  const m = inbody.measurements || [];
  if (m.length) {
    const latest = m[m.length - 1];
    const prev = m.length > 1 ? m[m.length - 2] : null;
    const diffSign = (v) => v > 0 ? `+${v.toFixed(1)}` : v.toFixed(1);

    $('kpi-weight').childNodes[0].textContent = latest.weight?.toFixed(1) ?? '–';
    $('kpi-fat').childNodes[0].textContent = latest.body_fat_percent?.toFixed(1) ?? '–';
    $('kpi-muscle').childNodes[0].textContent = latest.muscle_mass?.toFixed(1) ?? '–';

    if (prev) {
      $('kpi-weight-change').textContent = diffSign(latest.weight - prev.weight) + 'kg vs 이전';
      $('kpi-fat-change').textContent = diffSign(latest.body_fat_percent - prev.body_fat_percent) + '% vs 이전';
      $('kpi-muscle-change').textContent = diffSign(latest.muscle_mass - prev.muscle_mass) + 'kg vs 이전';
    } else {
      [$('kpi-weight-change'), $('kpi-fat-change'), $('kpi-muscle-change')]
        .forEach((el) => (el.textContent = fmtFull(latest.date)));
    }
  }
}

function buildCharts(workouts, inbody) {
  // Monthly bar
  const monthlyCounts = {};
  workouts.forEach((w) => {
    const d = new Date(w.start_time);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthlyCounts[key] = (monthlyCounts[key] || 0) + 1;
  });
  const mKeys = Object.keys(monthlyCounts).sort().slice(-12);
  makeChart('chartMonthly', 'bar', {
    labels: mKeys.map((k) => { const [y,m] = k.split('-'); return `${y.slice(2)}.${m}`; }),
    datasets: [{ data: mKeys.map((k) => monthlyCounts[k]), backgroundColor: '#6c63ff88', borderColor: '#6c63ff', borderWidth: 2, borderRadius: 6 }],
  });

  // Weekday doughnut
  const wdCounts = [0,0,0,0,0,0,0];
  workouts.forEach((w) => wdCounts[new Date(w.start_time).getDay()]++);
  makeChart('chartWeekday', 'doughnut', {
    labels: DAYS,
    datasets: [{ data: wdCounts, backgroundColor: ['#6c63ff','#ff6584','#43e97b','#f9a825','#29b6f6','#ab47bc','#ef5350'], borderWidth: 0 }],
  }, { extra: { plugins: { legend: { display: true, position: 'right' } } } });

  // InBody weight line
  const m = (inbody.measurements || []).sort((a,b) => a.date > b.date ? 1 : -1);
  if (m.length) {
    makeChart('chartWeight', 'line', {
      labels: m.map((x) => fmt(x.date)),
      datasets: [{
        data: m.map((x) => x.weight),
        borderColor: '#f9a825', backgroundColor: '#f9a82522',
        tension: 0.4, fill: true, pointRadius: 4,
      }],
    }, { yAxis: { min: Math.min(...m.map(x=>x.weight)) - 2 } });

    // Composition
    makeChart('chartComposition', 'line', {
      labels: m.map((x) => fmt(x.date)),
      datasets: [
        { label: '골격근량', data: m.map((x) => x.muscle_mass), borderColor: '#43e97b', backgroundColor: '#43e97b22', tension: 0.4, fill: false, pointRadius: 4 },
        { label: '체지방량', data: m.map((x) => x.fat_mass ?? x.body_fat_mass), borderColor: '#ff6584', backgroundColor: '#ff658422', tension: 0.4, fill: false, pointRadius: 4 },
      ],
    }, { extra: { plugins: { legend: { display: true } } } });
  }
}

// ── 1RM Estimation (NSCA multiplier table) ───────────────────
const NSCA_MULT = {
  squat:    [1.000,1.0475,1.13,1.1575,1.20,1.242,1.284,1.326,1.368,1.41,1.452,1.494],
  bench:    [1.000,1.035, 1.08,1.115, 1.15,1.18, 1.22, 1.255,1.29, 1.325,1.36, 1.395],
  deadlift: [1.000,1.065, 1.13,1.147, 1.164,1.181,1.198,1.22, 1.232,1.24, 1.252,1.264],
  ohp:      [1.000,1.035, 1.08,1.115, 1.15,1.18, 1.22, 1.255,1.29, 1.325,1.36, 1.395],
};

const RM_MATCH = {
  squat:    (n) => (/squat/i.test(n) || /스쿼트/.test(n)) && !/hack|belt|핵|벨트/.test(n),
  bench:    (n) => /bench/i.test(n) || /벤치/.test(n),
  deadlift: (n) => /deadlift/i.test(n) || /데드리프트/.test(n),
  ohp:      (n) => /overhead\s*press|military\s*press|\bohp\b/i.test(n) || /오버헤드\s*프레스|밀리터리\s*프레스|숄더\s*프레스/.test(n),
};

function calcOneRM(workouts) {
  const best = { squat: null, bench: null, deadlift: null, ohp: null };
  workouts.forEach((w) => {
    (w.exercises || []).forEach((ex) => {
      for (const [key, match] of Object.entries(RM_MATCH)) {
        if (!match(ex.title || '')) continue;
        (ex.sets || []).forEach((s) => {
          const kg = s.weight_kg, reps = s.reps;
          if (!kg || !reps || reps < 1 || reps > 12) return;
          const e1rm = Math.round(kg * NSCA_MULT[key][reps - 1]);
          if (!best[key] || e1rm > best[key].e1rm) {
            best[key] = { e1rm, kg, reps, date: w.start_time?.slice(0, 10) };
          }
        });
      }
    });
  });
  return best;
}

function renderOneRM(best) {
  [
    ['squat',    'rm-squat'],
    ['bench',    'rm-bench'],
    ['deadlift', 'rm-deadlift'],
    ['ohp',      'rm-ohp'],
  ].forEach(([key, id]) => {
    const v = best[key];
    if (!v) return;
    $(id).childNodes[0].textContent = v.e1rm;
    $(`${id}-sub`).textContent = `${v.kg}kg × ${v.reps}회 (${v.date || ''})`;
  });
}

// ── Main ──────────────────────────────────────────────────────
(async () => {
  try {
    const [wData, inbody] = await Promise.all([loadWorkouts(), loadInbody()]);
    const workouts = wData.workouts || [];

    if (wData.updated_at) {
      $('last-updated').textContent = '마지막 업데이트: ' + new Date(wData.updated_at).toLocaleString('ko-KR');
    } else {
      $('last-updated').textContent = '운동 데이터 없음';
    }

    renderKPI(workouts, inbody);
    buildHeatmap(workouts);
    renderWorkoutList(workouts);
    buildCharts(workouts, inbody);
    renderOneRM(calcOneRM(workouts));
  } catch (e) {
    console.error(e);
    $('last-updated').textContent = '데이터 로드 실패';
    $('workout-list').innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.</div>';
  }
})();
</script>
</body>
</html>
