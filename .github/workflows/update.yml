name: Update Fitness Data

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Hevy Data
        run: node fetch_hevy.js
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}

      - name: Import InBody CSV
        run: |
          if [ -f data/inbody_import.csv ]; then
            node scripts/import_inbody.js
          else
            echo "data/inbody_import.csv not found, skipping."
          fi

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/workouts.json data/inbody.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: update fitness data $(date -u '+%Y-%m-%d %H:%M') UTC" && git push
